# === === MONITOR === ===
monitor = ,preferred,auto,1.0
monitor = eDP-2,1920x1080@144,auto,1.0


# === === MY PROGRAMS === ===
$terminal = alacritty
$fileManager = nautilus
$menu = sh -c 'flock -n /tmp/wofi.lock wofi --show drun -I'
$exit = sh -c 'command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit'


# === === AUTOSTART === ===
exec-once = waybar


# === === ENVIRONMENT VARIABLES === ===
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland


# === === LOOK AND FEEL === ===
general {
    layout = dwindle
    gaps_in = 5
    gaps_out = 10
    border_size = 0
    resize_on_border = false
    allow_tearing = false
}

# -- blur layers
layerrule = blur on, ignore_alpha 0.5, match:namespace waybar
layerrule = blur on, ignore_alpha 0.5, match:namespace wofi

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 1
        passes = 4
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    # -- bezier curves
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    # -- animation definitions
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor, 1, 7, quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


# === === INPUT === ===
input {
    kb_options = grp:win_space_toggle
    kb_layout = us, ru
    follow_mouse = 1
    sensitivity = 0
    repeat_delay = 250
    repeat_rate = 50

    touchpad {
        natural_scroll = true
    }
}

# === === KEYBINDINGS === ===
$mainMod = SUPER

# -- touchpad
gestures {
    gesture = 3, swipe, ALT SHIFT, resize
    gesture = 3, swipe, mod:$mainMod SHIFT, move
    
    gesture = 3, horizontal, workspace
    gesture = 3, up, dispatcher, exec, $menu
}

# -- main keybinds
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout next
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, M, exec, $exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu


# -- window manipulations
bind = $mainMod SHIFT, C, killactive
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, E, togglesplit
bind = $mainMod SHIFT, Q, togglefloating

binde = $mainMod SHIFT, left, movewindow, l
binde = $mainMod SHIFT, right, movewindow, r
binde = $mainMod SHIFT, up, movewindow, u
binde = $mainMod SHIFT, down, movewindow, d
binde = $mainMod SHIFT, A, movewindow, l
binde = $mainMod SHIFT, D, movewindow, r
binde = $mainMod SHIFT, W, movewindow, u
binde = $mainMod SHIFT, S, movewindow, d

binde = $mainMod ALT, left,  resizeactive, -30 0
binde = $mainMod ALT, right, resizeactive, 30 0
binde = $mainMod ALT, up,    resizeactive, 0 -30
binde = $mainMod ALT, down,  resizeactive, 0 30
binde = $mainMod ALT, A,  resizeactive, -30 0
binde = $mainMod ALT, D, resizeactive, 30 0
binde = $mainMod ALT, W,    resizeactive, 0 -30
binde = $mainMod ALT, S,  resizeactive, 0 30

# -- move focus
binde = $mainMod, left, movefocus, l
binde = $mainMod, right, movefocus, r
binde = $mainMod, up, movefocus, u
binde = $mainMod, down, movefocus, d
binde = $mainMod, A, movefocus, l
binde = $mainMod, D, movefocus, r
binde = $mainMod, W, movefocus, u
binde = $mainMod, D, movefocus, d

# -- workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -- media / hardware
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous


# === === WINDOW RULES === ===

# -- suppress maximize for all windows
windowrule = suppress_event maximize, match:class .*

# -- prevent focus for empty windows that are floating XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

# -- hyprland-run: float + move
windowrule {
    name = hyprland-run
    match:class = ^(hyprland-run)$

    float = on
    move = 20 90%
}

# -- gtk file dialogues
windowrule {
    name = file-chooser-portal
    match:class = ^(xdg-desktop-portal-gtk|[Xx]dg-desktop-portal-gtk|org\.freedesktop\.impl\.portal\.desktop\.gtk|org\.freedesktop\.impl\.portal\.desktop\.hyprland)$

    float = on
    center = on
    size = 50% 50%
    no_initial_focus = on
}

# -- small popups
windowrule {
    name = small-dialogs
    match:class = .*
    match:content = 0

    float = on
    center = on
    size = 30% 20%
    no_initial_focus = on
}

# -- firefox popups
windowrule {
    name = file-chooser-firefox
    match:class = ^(Firefox|firefox)$
    match:initial_title = ^(Save|Save As|Open|Open File|Choose a file|Browse)$

    float = on
    center = on
    size = 55% 55%
    no_initial_focus = on
}


# === === MISC === ===
ecosystem:no_update_news=true
