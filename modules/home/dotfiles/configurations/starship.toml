"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

# The *format* places a single left corner, then a sequence of modules.
# Modules own their backgrounds (see their `style` + `format`) so empty modules
# don't leave separators behind.
format = """
[](fg:color5)\
$username\
[](fg:color5 bg:color1)\
$directory\
$git_branch\
$git_status\
$nix_shell\
[](fg:color6 bg:color4)\
$time\
[ ](fg:color4)\
"""

# ---------------------
# Username (leftmost)
# ---------------------
[username]
show_always = true
style_user = "bg:color5 fg:color0"
style_root = "bg:color5 fg:color0"
# username prints a trailing separator into the directory background (color1)
format = '[$user ]($style)[](fg:color5 bg:color1)'

# ---------------------
# Directory segment
# ---------------------
[directory]
# background uses terminal color1 (you control color1 in your terminal)
style = "bg:color1 fg:color0"
# formats its own content (and *does not* print an extra separator here)
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ---------------------
# Git: branch + status
# ---------------------
# Both share the same background so they appear as a single block when present.
[git_branch]
symbol = ""
style = "bg:color3 fg:color0"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:color3 fg:color0"
# prints the compact combined status for the repo
format = "[ $all_status$ahead_behind ]($style)"

# When git_branch + git_status are both empty, nothing from color3 prints,
# and the next separator (specified in the main format) handles transition.

# ---------------------
# Nix dev-shell
# ---------------------
[nix_shell]
symbol = " "
style = "bg:color6 fg:color0"
# tiny format that shows when a dev shell is active
format = "[ $symbol$state ]($style)"

# ---------------------
# Time (rightmost)
# ---------------------
[time]
disabled = false
time_format = "%R"
style = "bg:color4 fg:color0"
format = "[ ♥ $time ]($style)"

# ---------------------
# Disable all language/runtime modules (no noisy status everywhere)
# ---------------------
[c]        
disabled = true
[cpp]      
disabled = true
[python]   
disabled = true
