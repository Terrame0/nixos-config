"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

# -- colors
format = """
[Óā∂](fg:color5)\
$username\
[Óāį](fg:color5 bg:color1)\
$directory\
[Óāį](fg:color1 bg:color3)\
$git_branch\
$git_status\
[Óāį](fg:color3 bg:color6)\
$nix_shell\
[Óāį](fg:color6 bg:color4)\
$time\
[Óāį ](fg:color4)\
"""

# -- user
[username]
show_always = true
style_user = "bg:color5 fg:color0"
style_root = "bg:color5 fg:color0"
format = "[ $user ]($style)"

# -- directory
[directory]
style = "bg:color1 fg:color0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

# -- git
[git_branch]
symbol = "Ôźė"
style = "bg:color3 fg:color0"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:color3 fg:color0"
format = "[ $all_status$ahead_behind ]($style)"

# -- dev shell
[nix_shell]
symbol = "ÔĆď "
style = "bg:color6 fg:color0"
format = "[ $symbol$state ]($style)"

# -- time
[time]
disabled = false
time_format = "%R"
style = "bg:color4 fg:color0"
format = "[ ‚ô• $time ]($style)"

# -- disable language runtimes
[c]        
disabled = true
[cpp]      
disabled = true
[python]   
disabled = true
